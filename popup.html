<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header svg {
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }

    .stat-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      color: #ff4444;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #4caf50;
      justify-content: center;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="header">
    <!-- Simple shield icon -->
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <h1>YouTube Ad Blocker</h1>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="blocked-count">0</div>
    <div class="stat-label">ad requests blocked this session</div>
  </div>

  <div class="status">
    <span class="status-dot"></span>
    Protection active
  </div>

  <div class="footer">FreeHand &mdash; v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
